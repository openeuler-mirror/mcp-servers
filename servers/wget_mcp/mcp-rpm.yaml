name: "wget-downloader"
summary: "MCP server for file downloading using wget"
description: |
  Provides MCP tools for downloading files from URLs using wget command.

dependencies:
  system:
    - python3
    - uv
    - python3-mcp
    - wget

files:
  required:
    - mcp_config.json
    - src/server.py
  optional:
    - src/requirements.txt