name: "hadoop_mcp"
summary: "MCP server for Hadoop command-line operations"
description: |-
  Provides MCP tools that wrap Hadoop command-line operations, so AI can call it safely.

version: "1.0.0"
release: "1"

license: "MIT"

build_dependencies:
  system:
    - python3
    - uv

runtime_dependencies:
  system:
    - python3
    - uv
    - python3-mcp
    - jq
  packages:
    - hadoop

files:
  required:
    - mcp_config.json
    - src/server.py

install_script: |
  mkdir -p /opt/mcp-servers/servers/hadoop_mcp/src
  cp mcp_config.json /opt/mcp-servers/servers/hadoop_mcp/
  cp src/server.py /opt/mcp-servers/servers/hadoop_mcp/src/
  chmod +x /opt/mcp-servers/servers/hadoop_mcp/src/server.py